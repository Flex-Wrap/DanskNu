<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DanskNu</title>
    <script>
      // Capture the path from the 404 request
      var pathSegmentsToKeep = 1; // Keep 'DanskNu' segment

      var l = window.location;
      l.replace(
        l.protocol + '//' +
        l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
